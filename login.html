<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#212529" />
  <title>로그인 - LawQuery</title>
  <link rel="stylesheet" href="assets/vendor/bootstrap.min.css" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png" />
  <style>
    body { background: #f8f9fa; }
    .auth-wrap { max-width: 420px; margin: 0 auto; padding: 2rem 1rem; }
    .auth-card { border: 0; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
    .brand { text-align: center; margin-bottom: 1.5rem; }
    .brand img { width: 72px; height: 72px; }
    .brand-home { display: inline-block; text-decoration: none; color: inherit; cursor: pointer; }
    .brand-home:hover { opacity: .8; }
    .brand-home h4 { color: #212529; }
    .tab-btn.active { background: #212529; color: #fff; }
  </style>
</head>

<body>
  <div class="auth-wrap">
    <div class="brand">
      <a href="index.html" class="brand-home" title="메인(법령)으로 이동" aria-label="메인으로 이동">
        <img src="assets/icons/icon-192.png" alt="LawQuery" />
        <h4 class="mt-2 mb-0">LawQuery</h4>
      </a>
      <div class="text-muted small">금융법령·유권해석 검색</div>
    </div>

    <div class="card auth-card">
      <div class="card-body p-4">
        <div class="btn-group w-100 mb-3" role="group" id="authTabs">
          <button type="button" class="btn btn-outline-dark tab-btn active" id="tabLogin">로그인</button>
          <button type="button" class="btn btn-outline-dark tab-btn" id="tabRegister">회원가입</button>
        </div>

        <div id="alertBox" class="alert d-none" role="alert"></div>

        <form id="loginForm">
          <div class="mb-3">
            <label class="form-label">이메일</label>
            <input type="email" class="form-control" id="loginEmail" autocomplete="username" inputmode="email" placeholder="you@example.com" required />
          </div>
          <div class="mb-3">
            <label class="form-label">비밀번호</label>
            <input type="password" class="form-control" id="loginPassword" autocomplete="current-password" required />
          </div>
          <button type="submit" class="btn btn-dark w-100">로그인</button>
        </form>

        <form id="registerForm" class="d-none">
          <div class="mb-3">
            <label class="form-label">이메일</label>
            <input type="email" class="form-control" id="regEmail" autocomplete="username" inputmode="email" placeholder="you@example.com" required />
          </div>
          <div class="mb-3">
            <label class="form-label">비밀번호 <span class="text-muted small">(영문·숫자 6~30자)</span></label>
            <input type="password" class="form-control" id="regPassword" autocomplete="new-password" required />
          </div>
          <div class="mb-3">
            <label class="form-label">이름 <span class="text-muted small">(선택)</span></label>
            <input type="text" class="form-control" id="regName" autocomplete="name" />
          </div>
          <button type="submit" class="btn btn-dark w-100">가입하기</button>
          <p class="text-success small mt-3 mb-1">
            ✓ 회원가입 시 자동 승인되어 바로 이용하실 수 있습니다.
          </p>
          <p class="text-muted small mb-0">
            회원가입 시 <strong>5단 연계표·벌칙·별표·유권해석</strong> 등 전체 기능을
            모두 이용하실 수 있습니다.
          </p>
        </form>

        <!-- 이메일 인증번호 입력(가입 2단계) -->
        <form id="verifyForm" class="d-none">
          <p class="small text-muted mb-3">
            <strong id="verifyEmail"></strong> 으로 인증번호 6자리를 보냈습니다.<br>
            메일이 안 보이면 스팸함도 확인해 주세요.
          </p>
          <div class="mb-3">
            <label class="form-label">인증번호</label>
            <input type="text" class="form-control text-center fs-4" id="verifyCode"
              inputmode="numeric" maxlength="6" autocomplete="one-time-code" placeholder="------" required />
          </div>
          <button type="submit" class="btn btn-dark w-100">인증 완료</button>
          <div class="d-flex justify-content-between align-items-center mt-3">
            <button type="button" class="btn btn-link btn-sm p-0" id="resendBtn">인증번호 재전송</button>
            <button type="button" class="btn btn-link btn-sm p-0 text-muted" id="backToRegister">← 이메일 다시 입력</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const $ = (id) => document.getElementById(id);
      const alertBox = $('alertBox');

      // 페이지 접근 기록 (로그인 화면도 집계 — 비로그인 방문 포함)
      try {
        fetch('/api/auth/visit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ path: location.pathname }),
        }).catch(() => {});
      } catch (e) { /* noop */ }

      // 관리자 배너 (로그인 화면에도 점검 안내 등 표시)
      fetch('/api/auth/banner').then((r) => r.json()).then((b) => {
        if (!b || !b.enabled || !b.text) return;
        if (b.pages && b.pages.indexOf('login') === -1) return; // 로그인 화면 대상일 때만

        const colorMap = { info: '#0dcaf0', warning: '#ffc107', danger: '#dc3545', success: '#198754', secondary: '#6c757d', primary: '#0d6efd' };
        const bg = colorMap[b.color] || colorMap.info;
        const fg = (b.color === 'warning' || b.color === 'info') ? '#212529' : '#fff';
        const div = document.createElement('div');
        div.style.cssText = `background:${bg};color:${fg};padding:.5rem .9rem;font-size:.9rem;text-align:center;`;
        div.textContent = b.text;
        document.body.insertBefore(div, document.body.firstChild);
      }).catch(() => {});

      function showAlert(msg, type = 'danger') {
        alertBox.className = `alert alert-${type}`;
        alertBox.textContent = msg;
      }
      function clearAlert() { alertBox.className = 'alert d-none'; alertBox.textContent = ''; }

      $('tabLogin').addEventListener('click', () => {
        $('tabLogin').classList.add('active'); $('tabRegister').classList.remove('active');
        $('loginForm').classList.remove('d-none'); $('registerForm').classList.add('d-none');
        $('verifyForm').classList.add('d-none');
        clearAlert();
      });
      $('tabRegister').addEventListener('click', () => {
        $('tabRegister').classList.add('active'); $('tabLogin').classList.remove('active');
        $('registerForm').classList.remove('d-none'); $('loginForm').classList.add('d-none');
        $('verifyForm').classList.add('d-none');
        clearAlert();
      });

      // ── 이메일 인증(가입 2단계) ──
      let pendingEmail = '';
      let resendTimer = null;

      function showVerify(email) {
        pendingEmail = email;
        $('verifyEmail').textContent = email;
        $('authTabs').classList.add('d-none');
        $('loginForm').classList.add('d-none');
        $('registerForm').classList.add('d-none');
        $('verifyForm').classList.remove('d-none');
        $('verifyCode').value = '';
        $('verifyCode').focus();
        startResendCooldown(60);
        clearAlert();
      }
      function backToRegisterView() {
        if (resendTimer) { clearInterval(resendTimer); resendTimer = null; }
        $('verifyForm').classList.add('d-none');
        $('authTabs').classList.remove('d-none');
        $('tabRegister').classList.add('active'); $('tabLogin').classList.remove('active');
        $('registerForm').classList.remove('d-none');
        clearAlert();
      }
      function startResendCooldown(sec) {
        const btn = $('resendBtn');
        let left = sec;
        btn.disabled = true;
        btn.textContent = `재전송 (${left}초)`;
        if (resendTimer) clearInterval(resendTimer);
        resendTimer = setInterval(() => {
          left -= 1;
          if (left <= 0) {
            clearInterval(resendTimer); resendTimer = null;
            btn.disabled = false; btn.textContent = '인증번호 재전송';
          } else {
            btn.textContent = `재전송 (${left}초)`;
          }
        }, 1000);
      }

      $('backToRegister').addEventListener('click', backToRegisterView);

      async function doResend() {
        clearAlert();
        try {
          const r = await fetch('/api/auth/resend', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ loginId: pendingEmail }),
          });
          const data = await r.json();
          if (data.success) {
            if (data.devCode) showAlert('⚠️ 개발 모드: 메일 미발송. 인증번호 ' + data.devCode, 'warning');
            else showAlert('인증번호를 보냈습니다.', 'success');
            startResendCooldown(60);
          } else { showAlert(data.error || '재전송에 실패했습니다.'); }
        } catch { showAlert('서버 연결에 실패했습니다.'); }
      }
      $('resendBtn').addEventListener('click', doResend);

      $('verifyForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        clearAlert();
        const code = $('verifyCode').value.trim();
        if (!/^\d{6}$/.test(code)) { showAlert('인증번호 6자리를 입력해 주세요.'); return; }
        try {
          const r = await fetch('/api/auth/verify', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ loginId: pendingEmail, code }),
          });
          const data = await r.json();
          if (data.success) {
            // 인증 성공 = 가입 완료 + 자동 로그인 → 다음 화면에서 '전체 기능 안내' 온보딩 1회
            try { localStorage.setItem('lq_onboard_pro', '1'); } catch (e) { /* noop */ }
            go();
          } else { showAlert(data.error || '인증에 실패했습니다.'); }
        } catch { showAlert('서버 연결에 실패했습니다.'); }
      });

      function go() {
        const params = new URLSearchParams(location.search);
        const next = params.get('next');
        location.href = next || 'index.html';
      }

      $('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        clearAlert();
        try {
          const r = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ loginId: $('loginEmail').value, password: $('loginPassword').value }),
          });
          const data = await r.json();
          if (data.success) { go(); }
          else if (data.needVerify) {
            // 미인증 계정 → 인증 단계로 보내고 새 인증번호 발송(나중에 재시도 경로)
            showVerify((data.email || $('loginEmail').value).trim().toLowerCase());
            doResend();
          }
          else { showAlert(data.error || '로그인에 실패했습니다.'); }
        } catch { showAlert('서버 연결에 실패했습니다.'); }
      });

      $('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        clearAlert();
        try {
          const r = await fetch('/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              loginId: $('regEmail').value,
              password: $('regPassword').value,
              displayName: $('regName').value,
            }),
          });
          const data = await r.json();
          if (data.success && data.status === 'pending') {
            // 인증번호 입력 단계로 전환
            showVerify((data.email || $('regEmail').value).trim().toLowerCase());
            // 개발 모드(메일 미설정): 실제 발송이 아님을 명확히 표시 + 코드 노출
            if (data.devCode) showAlert('⚠️ 개발 모드: 메일이 실제로 발송되지 않았습니다. 인증번호 ' + data.devCode, 'warning');
          } else if (data.success && data.status === 'approved') {
            // (구버전 호환) 즉시 승인된 경우
            try { localStorage.setItem('lq_onboard_pro', '1'); } catch (e) { /* noop */ }
            go();
          } else {
            showAlert(data.error || '가입에 실패했습니다.');
          }
        } catch { showAlert('서버 연결에 실패했습니다.'); }
      });
    })();
  </script>
</body>

</html>
