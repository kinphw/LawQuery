<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#212529" />
  <title>로그인 - LawQuery</title>
  <link rel="stylesheet" href="assets/vendor/bootstrap.min.css" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png" />
  <style>
    body { background: #f8f9fa; }
    .auth-wrap { max-width: 420px; margin: 0 auto; padding: 2rem 1rem; }
    .auth-card { border: 0; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
    .brand { text-align: center; margin-bottom: 1.5rem; }
    .brand img { width: 72px; height: 72px; }
    .tab-btn.active { background: #212529; color: #fff; }
  </style>
</head>

<body>
  <div class="auth-wrap">
    <div class="brand">
      <img src="assets/icons/icon-192.png" alt="LawQuery" />
      <h4 class="mt-2 mb-0">LawQuery</h4>
      <div class="text-muted small">금융법령·유권해석 검색</div>
    </div>

    <div class="card auth-card">
      <div class="card-body p-4">
        <div class="btn-group w-100 mb-3" role="group">
          <button type="button" class="btn btn-outline-dark tab-btn active" id="tabLogin">로그인</button>
          <button type="button" class="btn btn-outline-dark tab-btn" id="tabRegister">회원가입</button>
        </div>

        <div id="alertBox" class="alert d-none" role="alert"></div>

        <form id="loginForm">
          <div class="mb-3">
            <label class="form-label">아이디</label>
            <input type="text" class="form-control" id="loginEmail" autocomplete="username" required />
          </div>
          <div class="mb-3">
            <label class="form-label">비밀번호</label>
            <input type="password" class="form-control" id="loginPassword" autocomplete="current-password" required />
          </div>
          <button type="submit" class="btn btn-dark w-100">로그인</button>
        </form>

        <form id="registerForm" class="d-none">
          <div class="mb-3">
            <label class="form-label">아이디 <span class="text-muted small">(영문·숫자 4~20자)</span></label>
            <input type="text" class="form-control" id="regEmail" autocomplete="username" required />
          </div>
          <div class="mb-3">
            <label class="form-label">비밀번호 <span class="text-muted small">(영문·숫자 6~30자)</span></label>
            <input type="password" class="form-control" id="regPassword" autocomplete="new-password" required />
          </div>
          <div class="mb-3">
            <label class="form-label">이름 <span class="text-muted small">(선택)</span></label>
            <input type="text" class="form-control" id="regName" autocomplete="name" />
          </div>
          <button type="submit" class="btn btn-dark w-100">가입하기</button>
          <p class="text-success small mt-3 mb-0">
            ✓ 회원가입 시 자동 승인되어 바로 이용하실 수 있습니다.
          </p>
        </form>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const $ = (id) => document.getElementById(id);
      const alertBox = $('alertBox');

      // 페이지 접근 기록 (로그인 화면도 집계 — 비로그인 방문 포함)
      try {
        fetch('/api/auth/visit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ path: location.pathname }),
        }).catch(() => {});
      } catch (e) { /* noop */ }

      // 관리자 배너 (로그인 화면에도 점검 안내 등 표시)
      fetch('/api/auth/banner').then((r) => r.json()).then((b) => {
        if (!b || !b.enabled || !b.text) return;
        if (b.pages && b.pages.indexOf('login') === -1) return; // 로그인 화면 대상일 때만

        const colorMap = { info: '#0dcaf0', warning: '#ffc107', danger: '#dc3545', success: '#198754', secondary: '#6c757d', primary: '#0d6efd' };
        const bg = colorMap[b.color] || colorMap.info;
        const fg = (b.color === 'warning' || b.color === 'info') ? '#212529' : '#fff';
        const div = document.createElement('div');
        div.style.cssText = `background:${bg};color:${fg};padding:.5rem .9rem;font-size:.9rem;text-align:center;`;
        div.textContent = b.text;
        document.body.insertBefore(div, document.body.firstChild);
      }).catch(() => {});

      function showAlert(msg, type = 'danger') {
        alertBox.className = `alert alert-${type}`;
        alertBox.textContent = msg;
      }
      function clearAlert() { alertBox.className = 'alert d-none'; alertBox.textContent = ''; }

      $('tabLogin').addEventListener('click', () => {
        $('tabLogin').classList.add('active'); $('tabRegister').classList.remove('active');
        $('loginForm').classList.remove('d-none'); $('registerForm').classList.add('d-none');
        clearAlert();
      });
      $('tabRegister').addEventListener('click', () => {
        $('tabRegister').classList.add('active'); $('tabLogin').classList.remove('active');
        $('registerForm').classList.remove('d-none'); $('loginForm').classList.add('d-none');
        clearAlert();
      });

      function go() {
        const params = new URLSearchParams(location.search);
        const next = params.get('next');
        location.href = next || 'index.html';
      }

      $('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        clearAlert();
        try {
          const r = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ loginId: $('loginEmail').value, password: $('loginPassword').value }),
          });
          const data = await r.json();
          if (data.success) { go(); }
          else { showAlert(data.error || '로그인에 실패했습니다.'); }
        } catch { showAlert('서버 연결에 실패했습니다.'); }
      });

      $('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        clearAlert();
        try {
          const r = await fetch('/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              loginId: $('regEmail').value,
              password: $('regPassword').value,
              displayName: $('regName').value,
            }),
          });
          const data = await r.json();
          if (data.success && data.status === 'approved') {
            go();
          } else if (data.success) {
            showAlert(data.message || '가입 신청이 완료되었습니다. 승인을 기다려 주세요.', 'success');
            $('registerForm').reset();
          } else {
            showAlert(data.error || '가입에 실패했습니다.');
          }
        } catch { showAlert('서버 연결에 실패했습니다.'); }
      });
    })();
  </script>
</body>

</html>
