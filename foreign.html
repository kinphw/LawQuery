<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#212529">
  <title>해외법령조회 - LawQuery</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png" />
  <link rel="stylesheet" href="assets/vendor/bootstrap.min.css" />
  <link rel="stylesheet" href="assets/vendor/fontawesome/css/fontawesome.min.css" />
  <link rel="stylesheet" href="assets/vendor/fontawesome/css/all.min.css" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <!-- 인증 게이트: 콘텐츠 paint 전에 인증을 먼저 확인(깜빡임 방지)하려고 head에서 동기 로드 -->
  <script src="auth-gate.js"></script>
  <style>
    /* 해외법령 전용(원문|번역|메모 2~3단 표) — 기존 style.css 무수정 */
    .fm-wrap { max-width: 1680px; margin: 0 auto; }  /* 2단 비교라 넓게(과하지 않게 제한) */
    /* 조문 목차·바로가기 */
    .fm-toc { border: 1px solid #dee2e6; border-radius: .5rem; padding: .6rem .85rem; margin-bottom: 1rem; background: #fafbfc; }
    .fm-toc-title { font-weight: 700; margin-bottom: .45rem; font-size: .95rem; }
    .fm-toc-body { max-height: 240px; overflow-y: auto; }
    .fm-toc-part { font-weight: 600; color: #6c757d; font-size: .82rem; margin: .5rem 0 .25rem; }
    .fm-toc-item { display: inline-block; margin: .12rem .3rem .12rem 0; padding: .12rem .45rem; font-size: .8rem;
      background: #fff; border: 1px solid #e3e6ea; border-radius: .25rem; text-decoration: none; color: #0d6efd; white-space: nowrap; }
    .fm-toc-item:hover { background: #e7f1ff; border-color: #0d6efd; }
    .fm-toc-h { color: #555; }
    .fm-toc-en { color: #9aa0a6; font-size: .92em; }
    tr[id^="fart-"] { scroll-margin-top: 64px; }  /* 상단 상태바(sticky)에 가리지 않게 */
    .fm-law-head { padding: .25rem 0 1rem; }
    .fm-table { table-layout: fixed; width: 100%; }
    .fm-table th { background: #212529; color: #fff; text-align: center; }
    .fm-table td { vertical-align: top; font-size: .92rem; }
    .fm-col-en { width: 44%; }
    .fm-col-ko { width: 41%; }
    .fm-col-memo { width: 15%; }
    .fm-en-body, .fm-ko { word-break: break-word; line-height: 1.55; }
    .fm-flow { white-space: pre-wrap; word-break: break-word; }
    .fm-flow + .fm-flow, .fm-flow + .fm-md-table, .fm-md-table + .fm-flow { margin-top: .45rem; }
    .fm-memo-view { white-space: pre-wrap; word-break: break-word; line-height: 1.55; }
    .fm-md-table { margin: .5rem 0; font-size: .82rem; width: 100%; }
    .fm-md-table th { background: #f1f3f5; color: #212529; }
    .fm-head { font-weight: 600; margin-bottom: .35rem; color: #0d6efd; }
    .fm-head.fm-annex { color: #6f42c1; font-size: 1.02rem; }
    /* seg-level: article 그룹 헤더 행 + seg 행 들여쓰기 */
    .fm-art-head td { background: #eef2f7; font-weight: 700; color: #0d6efd; font-size: 1.02rem; }
    .fm-art-head.fm-annex td { color: #6f42c1; }
    .fm-seg td { vertical-align: top; }
    .fm-seg.fm-indent td.fm-en, .fm-seg.fm-indent td:nth-child(2) { padding-left: 1.6rem; }
    .fm-part td { background: #e9ecef; font-weight: 700; font-size: .95rem; }
    .fm-ko.fm-empty { color: #adb5bd; font-style: italic; }
    /* 메모 = 운영자 큐레이션. 운영자 칸(.fm-memo)=편집 가능, 일반 칸(.fm-memo-ro)=읽기 전용 */
    .fm-memo { cursor: pointer; background: #fffdf3; }
    .fm-memo:hover { background: #fff6d6; }
    .fm-memo-ro { background: #fffdf3; }
    .fm-memo-view { font-size: .85rem; }
    .fm-memo-add { color: #c0a000; font-size: .85rem; }
    .fm-memo-actions { margin-top: .35rem; display: flex; align-items: center; gap: .35rem; }
    @media (max-width: 768px) {
      .fm-table, .fm-table tbody, .fm-table tr, .fm-table td { display: block; width: 100% !important; }
      .fm-table thead { display: none; }
      .fm-table td { border-top: 0; }
      .fm-table tr { border-bottom: 3px solid #dee2e6; margin-bottom: .5rem; }
      .fm-en::before { content: '원문'; display: block; font-size: .7rem; color: #888; }
      .fm-table td:nth-child(2)::before { content: '번역'; display: block; font-size: .7rem; color: #888; }
    }

    /* ── 관리자 인라인 수정(개발계 전용) — 칸 단위 그 자리 편집 ── */
    .fm-admin-edit { float: right; margin: 0 0 .25rem .4rem; padding: .05rem .4rem; font-size: .72rem;
      line-height: 1.4; color: #fff; background: #6f42c1; border: 0; border-radius: .25rem; cursor: pointer; opacity: .35; }
    .fm-en:hover .fm-admin-edit, .fm-ko-cell:hover .fm-admin-edit, .fm-art-head:hover .fm-admin-edit,
    .fm-admin-edit:hover { opacity: 1; }
    .fm-art-head .fm-admin-edit { background: #0d6efd; }
    .fm-cell-editing { background: #f6f2fc !important; }
    .fm-ed-input { font-size: .9rem; width: 100%; }
    .fm-en .fm-ed-input { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: .85rem; }
    .fm-ed-warn { font-size: .76rem; color: #b8860b; margin-top: .3rem; }
    .fm-edit-grid { display: flex; flex-direction: column; gap: .2rem; }
    .fm-edit-label { font-size: .82rem; font-weight: 600; color: #495057; margin: .3rem 0 .1rem; }
    .fm-edit-label:first-child { margin-top: 0; }
    .fm-edit-actions { margin-top: .5rem; display: flex; align-items: center; gap: .4rem; flex-wrap: wrap; }

    /* ── 뷰어 상단: 목록 백링크 + 소개 카드 ── */
    .fm-back { margin-bottom: .5rem; }
    .fm-back a { font-size: .9rem; color: #6c757d; text-decoration: none; }
    .fm-back a:hover { color: #0d6efd; }
    .fm-intro { border: 1px solid #e3e6ea; border-left: 3px solid #0d6efd; border-radius: .4rem;
      background: #f8fbff; padding: .7rem .9rem; margin: 0 0 1rem; }
    .fm-intro-summary { font-size: .92rem; line-height: 1.55; color: #343a40; }
    .fm-intro-hi { margin: .5rem 0 0; padding-left: 1.1rem; font-size: .86rem; color: #495057; }
    .fm-intro-hi li { margin: .12rem 0; }
    .fm-intro-src { margin-top: .5rem; font-size: .84rem; }

    /* ── 랜딩: 국가별 소개 카탈로그 ── */
    .fx-overview { max-width: 1200px; }
    .fx-juris-head { display: flex; align-items: baseline; gap: .5rem; margin: 1.1rem 0 .5rem;
      padding-bottom: .35rem; border-bottom: 2px solid #e9ecef; }
    .fx-juris-label { font-size: 1.05rem; font-weight: 700; color: #212529; }
    .fx-card { display: flex; flex-direction: column; height: 100%; padding: .85rem .95rem;
      border: 1px solid #e3e6ea; border-radius: .55rem; background: #fff; text-decoration: none; color: inherit;
      transition: box-shadow .15s, border-color .15s, transform .15s; }
    .fx-card:hover { border-color: #0d6efd; box-shadow: 0 .35rem .9rem rgba(13,110,253,.12); transform: translateY(-2px); }
    .fx-card-badges { margin-bottom: .4rem; display: flex; flex-wrap: wrap; gap: .25rem; align-items: center; }
    .fx-card-title { font-weight: 700; font-size: 1rem; line-height: 1.35; color: #212529; }
    .fx-card-en { font-size: .78rem; color: #9aa0a6; margin-top: .1rem;
      display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
    .fx-card-summary { font-size: .87rem; line-height: 1.5; color: #495057; margin: .5rem 0 .35rem; }
    .fx-tags { display: flex; flex-wrap: wrap; gap: .25rem; margin-bottom: .55rem; }
    .fx-tag { font-size: .72rem; color: #0d6efd; background: #eef4ff; border: 1px solid #d6e4ff;
      border-radius: 1rem; padding: .05rem .5rem; }
    .fx-card-foot { margin-top: auto; display: flex; align-items: center; justify-content: space-between;
      padding-top: .5rem; border-top: 1px dashed #eef0f2; }
    .fx-card-go { font-size: .85rem; font-weight: 600; color: #0d6efd; }
    .fx-card:hover .fx-card-go { text-decoration: underline; }
  </style>
</head>

<body>
  <div id="header"></div>

  <!-- 상단 컨트롤 바: 해외법령 선택 -->
  <div class="container my-3">
    <div class="d-flex flex-wrap align-items-center justify-content-center gap-2">
      <div class="d-flex align-items-center gap-2">
        <div id="currentForeignBox" class="badge bg-dark text-white px-3 py-2 fs-6">법령 선택</div>
        <div class="dropdown">
          <button class="btn btn-sm btn-dark dropdown-toggle" type="button" id="foreignDropdown"
            data-bs-toggle="dropdown" aria-expanded="false">
            해외법령 선택
          </button>
          <ul class="dropdown-menu" id="foreignDropdownMenu" aria-labelledby="foreignDropdown"
            style="max-height: 70vh; overflow-y: auto;">
            <li><span class="dropdown-item-text text-muted">불러오는 중…</span></li>
          </ul>
        </div>
      </div>
    </div>
    <p class="text-center text-muted small mt-2 mb-0">
      해외 결제·전자금융·가상자산 법령의 원문과 한글 번역(참고용). 메모는 로그인 후 이용하실 수 있어요.
    </p>
  </div>

  <div id="results"></div>

  <!-- 기본 라이브러리 -->
  <script src="assets/vendor/bootstrap.bundle.min.js"></script>
  <script src="dist/foreign.bundle.js" type="module"></script>

  <!-- PWA: Service Worker 등록 -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('service-worker.js').catch(function (e) {
          console.error('SW 등록 실패:', e);
        });
      });
    }
  </script>

  <!-- 공통 모달 (Header 정보 버튼 등) -->
  <div class="modal fade" id="commonModal" tabindex="-1" aria-labelledby="commonModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="commonModalLabel">알림</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="닫기"></button>
        </div>
        <div class="modal-body"></div>
      </div>
    </div>
  </div>

</body>

</html>
