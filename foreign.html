<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#212529">
  <title>해외법령조회 - LawQuery</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png" />
  <link rel="stylesheet" href="assets/vendor/bootstrap.min.css" />
  <link rel="stylesheet" href="assets/vendor/fontawesome/css/fontawesome.min.css" />
  <link rel="stylesheet" href="assets/vendor/fontawesome/css/all.min.css" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <!-- 인증 게이트: 콘텐츠 paint 전에 인증을 먼저 확인(깜빡임 방지)하려고 head에서 동기 로드 -->
  <script src="auth-gate.js"></script>
  <style>
    /* 해외법령 전용(원문|번역|메모 2~3단 표) — 기존 style.css 무수정 */
    /* bootstrap.min.css가 :root{scroll-behavior:smooth}를 걸어놓아 목차 바로가기(#fa-…)가
       애니메이션 스크롤을 탄다. content-visibility:auto 로 윈도잉된 대형 표에서는 스크롤
       도중 화면 밖 조들이 실측 높이로 갱신되며 목표 위치가 이동하는데, 애니메이션은 처음
       계산한 거리만큼만 움직이고 멈춰 실제 목표보다 한참 못 미친 곳에 떨어진다. 즉시 이동으로
       되돌린다(law/interpretation은 이런 대형 windowing이 없어 영향 없음). */
    html { scroll-behavior: auto !important; }
    .fm-wrap { max-width: 1680px; margin: 0 auto; }  /* 2단 비교라 넓게(과하지 않게 제한) */
    /* 조문 목차·바로가기 */
    .fm-toc { border: 1px solid #dee2e6; border-radius: .5rem; padding: .6rem .85rem; margin-bottom: 1rem; background: #fafbfc; }
    .fm-toc-title { font-weight: 700; margin-bottom: .45rem; font-size: .95rem; }
    .fm-toc-body { max-height: 240px; overflow-y: auto; }
    .fm-toc-part { font-weight: 600; color: #6c757d; font-size: .82rem; margin: .5rem 0 .25rem; }
    .fm-toc-item { display: inline-block; margin: .12rem .3rem .12rem 0; padding: .12rem .45rem; font-size: .8rem;
      background: #fff; border: 1px solid #e3e6ea; border-radius: .25rem; text-decoration: none; color: #0d6efd; white-space: nowrap; }
    .fm-toc-item:hover { background: #e7f1ff; border-color: #0d6efd; }
    .fm-toc-h { color: #555; }
    .fm-toc-en { color: #9aa0a6; font-size: .92em; }
    /* 상단 회원바(--lq-userbar-h, auth-gate.js가 동적 측정 — 모바일은 버튼 줄바꿈으로 높이가 커짐)에
       목차 점프 대상이 가리지 않게. law/interpretation과 동일 패턴(assets/scss/law/_responsive.scss). */
    tr[id^="fa-"] { scroll-margin-top: calc(var(--lq-userbar-h, 0px) + 8px); }
    .fm-law-head { padding: .25rem 0 1rem; }
    .fm-table { table-layout: fixed; width: 100%; }
    /* 조(article)별 tbody 윈도잉: 화면 밖 조는 레이아웃/페인트 스킵 → 대형 법령(수천 행) 편집 시
       셀 하나 바꿔도 표 전체가 아니라 '보이는 조'만 재배치(reflow). 미지원 브라우저는 전체 렌더(무해 폴백). */
    .fm-table tbody.fm-art-group { content-visibility: auto; contain-intrinsic-size: auto 200px; }
    .fm-table th { background: #212529; color: #fff; text-align: center; }
    .fm-table td { vertical-align: top; font-size: .92rem; }
    .fm-col-en { width: 44%; }
    .fm-col-ko { width: 41%; }
    .fm-col-memo { width: 15%; }
    .fm-en-body, .fm-ko { word-break: break-word; line-height: 1.55; }
    .fm-flow { white-space: pre-wrap; word-break: break-word; }
    .fm-flow + .fm-flow, .fm-flow + .fm-md-table, .fm-md-table + .fm-flow { margin-top: .45rem; }
    .fm-memo-view { white-space: pre-wrap; word-break: break-word; line-height: 1.55; }
    .fm-md-table { margin: .5rem 0; font-size: .82rem; width: 100%; }
    .fm-md-table th { background: #f1f3f5; color: #212529; }
    .fm-head { font-weight: 600; margin-bottom: .35rem; color: #0d6efd; }
    .fm-head.fm-annex { color: #6f42c1; font-size: 1.02rem; }
    /* seg-level: article 그룹 헤더 행 + seg 행 들여쓰기 */
    .fm-art-head td { background: #eef2f7; font-weight: 700; color: #0d6efd; font-size: 1.02rem; }
    .fm-art-head.fm-annex td { color: #6f42c1; }
    /* 전문(前文·Recitals) = 제·개정 이유. 배경 자료임을 청록 강조 + 좌측 바로 구분 */
    .fm-art-head.fm-recital td { color: #0a7d6b; background: #eaf6f3; border-left: 3px solid #0a7d6b; }
    /* 미국 CFR 제·개정 이유(Federal Register 서문) = 결론도출근거. 앰버 강조 */
    .fm-art-head.fm-preamble td { color: #92400e; background: #fef6e7; border-left: 3px solid #d97706; }
    .fm-preamble-tag { display: inline-block; font-size: .78rem; font-weight: 700; color: #b45309;
      background: #fde9c8; border-radius: .25rem; padding: 0 .4rem; margin-right: .35rem; }
    .fm-seg td { vertical-align: top; }
    .fm-seg.fm-indent td.fm-en, .fm-seg.fm-indent td:nth-child(2) { padding-left: 1.6rem; }
    .fm-part td { background: #e9ecef; font-weight: 700; font-size: .95rem; }
    .fm-ko.fm-empty { color: #adb5bd; font-style: italic; }
    /* 메모 = 운영자 큐레이션. 운영자 칸(.fm-memo)=편집 가능, 일반 칸(.fm-memo-ro)=읽기 전용 */
    .fm-memo { cursor: pointer; background: #fffdf3; }
    .fm-memo:hover { background: #fff6d6; }
    .fm-memo-ro { background: #fffdf3; }
    .fm-memo-view { font-size: .85rem; }
    .fm-memo-add { color: #c0a000; font-size: .85rem; }
    .fm-memo-actions { margin-top: .35rem; display: flex; align-items: center; gap: .35rem; }
    /* ── 즐겨찾기(★) 토글 = 회원별 개인 북마크. 원문셀(fm-en) 우상단, 켜면 행 전체 강조 ── */
    /* 별·강조색은 로그인 회원에게만 노출(favorites는 회원만 로드). 데스크톱/모바일 동일하게 동작. */
    .fm-fav-toggle { float: right; margin: 0 0 .25rem .4rem; padding: .05rem .3rem; font-size: .85rem;
      line-height: 1.4; color: #ccc; background: transparent; border: 0; cursor: pointer; }
    .fm-fav-toggle:hover { color: #e0a800; }
    .fm-fav-toggle.fm-fav-on { color: #f0ad4e; }
    .fm-seg.fm-fav > td { background: #fff3cd; }
    .fm-seg.fm-fav > td.fm-en { box-shadow: inset 3px 0 0 #f0ad4e; } /* 강조 행 좌측 액센트 바 */
    @media (max-width: 768px) {
      .fm-table, .fm-table tbody, .fm-table tr, .fm-table td { display: block; width: 100% !important; }
      .fm-table thead { display: none; }
      .fm-table td { border-top: 0; }
      .fm-table tr { border-bottom: 3px solid #dee2e6; margin-bottom: .5rem; }
      .fm-en::before { content: '원문'; display: block; font-size: .7rem; color: #888; }
      .fm-table td:nth-child(2)::before { content: '번역'; display: block; font-size: .7rem; color: #888; }
    }

    /* ── 관리자 수정 버튼(✎) ── */
    .fm-admin-edit { float: right; margin: 0 0 .25rem .4rem; padding: .05rem .4rem; font-size: .72rem;
      line-height: 1.4; color: #fff; background: #6f42c1; border: 0; border-radius: .25rem; cursor: pointer; opacity: .35; }
    .fm-en:hover .fm-admin-edit, .fm-ko-cell:hover .fm-admin-edit, .fm-art-head:hover .fm-admin-edit,
    .fm-memo:hover .fm-admin-edit, .fm-admin-edit:hover { opacity: 1; }
    .fm-art-head .fm-admin-edit { background: #0d6efd; }

    /* ── 복사 버튼: 모든 사용자, 터치기기는 hover가 없으므로 상시 은은하게 보이게 ── */
    .fm-copy-btn { float: right; margin: 0 0 .25rem .4rem; padding: .05rem .4rem; font-size: .72rem;
      line-height: 1.4; color: #495057; background: #f1f3f5; border: 1px solid #dee2e6;
      border-radius: .25rem; cursor: pointer; opacity: .55; }
    .fm-copy-btn:hover { opacity: 1; background: #e9ecef; }
    .fm-copy-btn.fm-copy-done { background: #d1e7dd; border-color: #a3cfbb; color: #0f5132; opacity: 1; }

    /* ── 편집 팝오버 — 클릭한 칸 바로 아래(표를 안 건드려 표 높이 유지 → reflow/프리즈 없음) ── */
    .fm-pop { position: absolute; z-index: 1081; background: #fff; border: 1px solid #b9a3e0;
      border-radius: .5rem; box-shadow: 0 .6rem 1.6rem rgba(0,0,0,.28); padding: .7rem .85rem; }
    .fm-pop-head { font-weight: 700; font-size: .88rem; color: #4b2e83; margin-bottom: .5rem; }
    .fm-modal-body { display: flex; flex-direction: column; gap: .2rem; }
    .fm-modal-label { font-size: .82rem; font-weight: 600; color: #495057; margin: .3rem 0 .1rem; }
    .fm-modal-label:first-child { margin-top: 0; }
    .fm-modal-input { font-size: .9rem; width: 100%; }
    .fm-modal-input.fm-mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: .85rem; }
    .fm-ed-warn { font-size: .78rem; color: #b8860b; margin: .1rem 0 .4rem; }
    .fm-modal-foot { margin-top: .6rem; display: flex; align-items: center; gap: .4rem; flex-wrap: wrap; }

    /* ── 뷰어 상단: 목록 백링크 + 소개 카드 ── */
    .fm-back { margin-bottom: .5rem; }
    .fm-back a { font-size: .9rem; color: #6c757d; text-decoration: none; }
    .fm-back a:hover { color: #0d6efd; }
    .fm-intro { border: 1px solid #e3e6ea; border-left: 3px solid #0d6efd; border-radius: .4rem;
      background: #f8fbff; padding: .7rem .9rem; margin: 0 0 1rem; }
    .fm-intro-summary { font-size: .92rem; line-height: 1.55; color: #343a40; }
    .fm-intro-hi { margin: .5rem 0 0; padding-left: 1.1rem; font-size: .86rem; color: #495057; }
    .fm-intro-hi li { margin: .12rem 0; }
    .fm-intro-src { margin-top: .5rem; font-size: .84rem; }

    /* ── 랜딩: 국가별 소개 카탈로그 ── */
    .fx-overview { max-width: 1200px; }
    .fx-juris-head { display: flex; align-items: baseline; gap: .5rem; margin: 1.1rem 0 .5rem;
      padding-bottom: .35rem; border-bottom: 2px solid #e9ecef; }
    .fx-juris-label { font-size: 1.05rem; font-weight: 700; color: #212529; }
    .fx-card { display: flex; flex-direction: column; height: 100%; padding: .85rem .95rem;
      border: 1px solid #e3e6ea; border-radius: .55rem; background: #fff; text-decoration: none; color: inherit;
      transition: box-shadow .15s, border-color .15s, transform .15s; }
    .fx-card:hover { border-color: #0d6efd; box-shadow: 0 .35rem .9rem rgba(13,110,253,.12); transform: translateY(-2px); }
    .fx-card-badges { margin-bottom: .4rem; display: flex; flex-wrap: wrap; gap: .25rem; align-items: center; }
    .fx-card-title { font-weight: 700; font-size: 1rem; line-height: 1.35; color: #212529; }
    .fx-card-en { font-size: .78rem; color: #9aa0a6; margin-top: .1rem;
      display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
    .fx-card-summary { font-size: .87rem; line-height: 1.5; color: #495057; margin: .5rem 0 .35rem; }
    .fx-tags { display: flex; flex-wrap: wrap; gap: .25rem; margin-bottom: .55rem; }
    .fx-tag { font-size: .72rem; color: #0d6efd; background: #eef4ff; border: 1px solid #d6e4ff;
      border-radius: 1rem; padding: .05rem .5rem; }
    .fx-card-foot { margin-top: auto; display: flex; align-items: center; justify-content: space-between;
      padding-top: .5rem; border-top: 1px dashed #eef0f2; }
    .fx-card-go { font-size: .85rem; font-weight: 600; color: #0d6efd; }
    .fx-card:hover .fx-card-go { text-decoration: underline; }
    /* ── 일본법 하위규정 연계(자동 추출) — 조 헤더 하단 칩 바 ── */
    .fm-links { margin-top: .5rem; padding-top: .5rem; border-top: 1px dashed #cdd7e5;
      font-weight: 400; color: #333; }
    .fm-links-head { font-size: .74rem; font-weight: 600; color: #5b6b7f; margin-bottom: .3rem; }
    .fm-links-head i { margin-right: .2rem; }
    .fm-links-auto { font-size: .66rem; font-weight: 600; color: #8a6d00; background: #fff4d6;
      border: 1px solid #f2e0a8; border-radius: 1rem; padding: .02rem .4rem; margin-left: .35rem;
      vertical-align: middle; }
    .fm-links-row { display: flex; flex-wrap: wrap; align-items: center; gap: .3rem; margin: .25rem 0; }
    .fm-links-lb { font-size: .72rem; color: #6c757d; min-width: 3.6rem; }
    .fm-links-lb i { margin-right: .15rem; font-size: .68rem; }
    .fm-link-chip { display: inline-flex; align-items: baseline; gap: .25rem; font-size: .78rem;
      line-height: 1.3; color: #0d6efd; background: #eef4ff; border: 1px solid #d6e4ff;
      border-radius: 1rem; padding: .08rem .5rem; text-decoration: none; white-space: nowrap; }
    .fm-link-chip:hover { background: #dbe8ff; border-color: #9ec2ff; text-decoration: none; }
    .fm-link-chip .fm-link-nm { font-weight: 600; }
    .fm-link-chip.fm-link-deleg { color: #9a6b00; background: #fff6e0; border-color: #f0dca6; }
    .fm-link-chip.fm-link-deleg:hover { background: #ffefc7; border-color: #e6c86a; }
    .fm-link-more { font-size: .72rem; color: #6c757d; }
    @media (max-width: 768px) {
      .fm-links-row { gap: .25rem; }
      .fm-link-chip { font-size: .74rem; }
    }
    /* ── 3단 연계표(법→시행령→부령) ── */
    .flt-wrap { padding: 0 .5rem; }
    .flt-head h4 { color: #212529; }
    .flt-open-btn { text-decoration: none; }
    .flt-toolbar { display: flex; align-items: center; gap: 1.4rem; margin: .6rem 0 .8rem; flex-wrap: wrap; }
    .flt-tabs { display: flex; align-items: center; gap: .4rem; flex-wrap: wrap; }
    .flt-tabs-lb { font-size: .8rem; color: #6c757d; font-weight: 600; }
    .flt-tab, .flt-mode, .flt-rel { font-size: .82rem; padding: .2rem .7rem; border: 1px solid #ced4da; background: #fff;
      border-radius: 1rem; cursor: pointer; color: #495057; }
    .flt-tab:hover, .flt-mode:hover, .flt-rel:hover { border-color: #495057; color: #212529; }
    .flt-tab.active, .flt-mode.active, .flt-rel.active { background: #343a40; border-color: #343a40; color: #fff; font-weight: 600; }
    .flt-table-wrap { max-height: calc(100vh - 160px); overflow: auto; border: 1px solid #dee2e6; border-radius: .4rem; }
    .flt-table { table-layout: fixed; width: 100%; min-width: 1100px; margin: 0; font-size: .82rem; }
    .flt-table thead th { position: sticky; top: 0; z-index: 2; text-align: center; padding: .35rem .4rem; }
    /* 모노톤: 다크 단색 헤더. 단(tier) 구분은 색이 아니라 좌측 경계선 + 가운데단 옅은 음영으로. */
    .flt-thead-tier th { font-size: .86rem; font-weight: 700; color: #fff; background: #212529; }
    .flt-thead-tier .flt-h-enf, .flt-thead-tier .flt-h-sub { border-left: 2px solid #6c757d; }
    .flt-thead-lang th { top: 30px; background: #f1f3f5; font-size: .72rem; font-weight: 600; color: #495057; }
    .flt-band { content-visibility: auto; contain-intrinsic-size: auto 320px; }
    .flt-table td { vertical-align: top; padding: .3rem .45rem; border-color: #e3e6ea; }
    .flt-table td.flt-law { background: #fff; }
    .flt-table td.flt-enf { background: #f4f5f7; }        /* 가운데단(시행령) 옅은 음영으로 그룹 구분 */
    .flt-table td.flt-sub { background: #fff; }
    .flt-table td.flt-blank { background: #fafbfc; }
    .flt-artno { display: inline-block; font-weight: 700; font-size: .78rem; color: #343a40;
      text-decoration: none; margin-bottom: .25rem; }
    .flt-artno:hover { color: #0d6efd; text-decoration: underline; }
    .flt-head { font-weight: 400; color: #6c757d; font-size: .74rem; }
    /* 항(項) seg 를 블록으로 분리 — 셀 내부 스크롤 없음(국내 연계표처럼 페이지 스크롤). */
    .flt-seg { white-space: pre-wrap; word-break: break-word; line-height: 1.5; padding: .12rem 0;
      border-top: 1px dotted #eceff2; }
    .flt-seg:first-of-type { border-top: 0; }
    .flt-para { display: inline-block; min-width: 1.1em; margin-right: .25rem; font-weight: 700;
      color: #b0b6bd; font-size: .72rem; }
    /* 위임된 항 강조 — 유일한 기능색(옅은 앰버). 나머지는 모두 무채색. */
    .flt-seg.flt-hl { background: #fbf4dd; border-radius: .2rem; box-shadow: inset 2px 0 0 #cbb46a; padding-left: .3rem; }
    .flt-empty { color: #adb5bd; font-style: italic; }
    @media (max-width: 768px) { .flt-table { font-size: .78rem; } }
  </style>
</head>

<body>
  <div id="header"></div>

  <!-- 상단 컨트롤 바: 해외법령 선택 -->
  <div class="container my-3">
    <div class="d-flex flex-wrap align-items-center justify-content-center gap-2">
      <div class="d-flex align-items-center gap-2">
        <div id="currentForeignBox" class="badge bg-dark text-white px-3 py-2 fs-6">법령 선택</div>
        <div class="dropdown">
          <button class="btn btn-sm btn-dark dropdown-toggle" type="button" id="foreignDropdown"
            data-bs-toggle="dropdown" aria-expanded="false">
            해외법령 선택
          </button>
          <ul class="dropdown-menu" id="foreignDropdownMenu" aria-labelledby="foreignDropdown"
            style="max-height: 70vh; overflow-y: auto;">
            <li><span class="dropdown-item-text text-muted">불러오는 중…</span></li>
          </ul>
        </div>
      </div>
    </div>
    <p class="text-center text-muted small mt-2 mb-0">
      해외 결제·전자금융·가상자산 법령의 원문과 한글 번역(참고용). 로그인하면 조문별 즐겨찾기(★ 강조표시)를 이용할 수 있어요.
    </p>
  </div>

  <div id="results"></div>

  <!-- 기본 라이브러리 -->
  <script src="assets/vendor/bootstrap.bundle.min.js"></script>
  <script src="dist/foreign.bundle.js" type="module"></script>

  <!-- PWA: Service Worker 등록 -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('service-worker.js').catch(function (e) {
          console.error('SW 등록 실패:', e);
        });
      });
    }
  </script>

  <!-- 공통 모달 (Header 정보 버튼 등) -->
  <div class="modal fade" id="commonModal" tabindex="-1" aria-labelledby="commonModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
