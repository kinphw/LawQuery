<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#212529" />
  <title>관리자 - LawQuery</title>
  <link rel="stylesheet" href="assets/vendor/bootstrap.min.css" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <style>
    /* 모바일 대응: 넓은 표는 가로 스크롤, 셀 압축 */
    @media (max-width: 767.98px) {
      .container { padding-left: .6rem; padding-right: .6rem; }
      .admin-table { font-size: .8rem; }
      .admin-table th, .admin-table td { padding: .35rem .4rem; }
      .admin-table .actions { display: flex; flex-wrap: wrap; gap: .25rem; }
      .admin-table .actions .btn { padding: .15rem .4rem; font-size: .72rem; }
      .nav-tabs .nav-link { padding: .4rem .6rem; font-size: .9rem; }
      .navbar-brand { font-size: 1rem; }
    }
    .ip-list { word-break: break-all; }
    .multi-ip { color: #c62828; font-weight: 600; } /* IP 여러 개면 강조(공유 의심) */
  </style>
</head>

<body>
  <nav class="navbar navbar-dark bg-dark sticky-top">
    <div class="container-fluid">
      <span class="navbar-brand mb-0 h1">LawQuery 관리자</span>
      <div class="d-flex gap-2">
        <a class="btn btn-outline-light btn-sm" href="index.html">← 본 페이지</a>
        <button class="btn btn-outline-light btn-sm" id="logoutBtn">로그아웃</button>
      </div>
    </div>
  </nav>

  <div class="container py-3">
    <div id="gateMsg" class="alert alert-warning d-none"></div>

    <div id="adminContent" class="d-none">
      <ul class="nav nav-tabs mb-3">
        <li class="nav-item"><button class="nav-link active" id="navMembers">회원 관리 <span id="pendBadge" class="badge bg-danger d-none">0</span></button></li>
        <li class="nav-item"><button class="nav-link" id="navAccess">접근 기록</button></li>
        <li class="nav-item"><button class="nav-link" id="navStats">통계</button></li>
        <li class="nav-item"><button class="nav-link" id="navSettings">설정</button></li>
      </ul>

      <!-- ===== 회원 관리 ===== -->
      <section id="sectionMembers">
        <div class="d-flex align-items-center gap-2 mb-3 flex-wrap">
          <div class="btn-group" role="group">
            <button class="btn btn-outline-dark filter-btn active" data-status="pending">승인대기</button>
            <button class="btn btn-outline-dark filter-btn" data-status="approved">승인됨</button>
            <button class="btn btn-outline-dark filter-btn" data-status="">전체</button>
          </div>
          <button class="btn btn-outline-secondary ms-auto" id="refreshBtn">새로고침</button>
        </div>
        <div class="table-responsive">
          <table class="table table-bordered table-hover align-middle admin-table">
            <thead class="table-dark">
              <tr>
                <th>ID</th><th>아이디</th><th>이름</th><th>경로</th>
                <th>상태</th><th>권한</th><th>가입일</th><th>최근로그인</th><th>처리</th>
              </tr>
            </thead>
            <tbody id="memberTbody">
              <tr><td colspan="9" class="text-center text-muted">불러오는 중...</td></tr>
            </tbody>
          </table>
        </div>
      </section>

      <!-- ===== 접근 기록 (ID별 IP 요약 + 상세 로그 통합) ===== -->
      <section id="sectionAccess" class="d-none">
        <!-- ⓪ 로그인 실패 반복 경고 -->
        <div id="failWarnBox" class="alert alert-danger d-none">
          <strong>⚠ 로그인 실패 반복 (최근 24시간)</strong>
          <div id="failWarnList" class="small mt-1"></div>
        </div>

        <!-- ① ID별 IP 요약 -->
        <h6 class="mb-2">아이디별 접속 IP</h6>
        <p class="text-muted small mb-2">아이디마다 접속한 IP를 모아 봅니다. IP가 여러 개면 <span class="multi-ip">빨강</span>으로 표시(계정 공유 의심).</p>
        <div class="table-responsive mb-4">
          <table class="table table-bordered table-sm align-middle admin-table">
            <thead class="table-dark">
              <tr><th>아이디</th><th>이름</th><th>IP(고유)</th><th>접속 IP 목록</th><th>총</th><th>최근</th></tr>
            </thead>
            <tbody id="ipTbody">
              <tr><td colspan="6" class="text-center text-muted">불러오는 중...</td></tr>
            </tbody>
          </table>
        </div>

        <!-- ② 상세 로그 -->
        <div class="d-flex align-items-center gap-2 mb-2 flex-wrap">
          <h6 class="mb-0">상세 로그</h6>
          <div class="btn-group btn-group-sm ms-2" role="group">
            <button class="btn btn-outline-dark log-filter-btn active" data-event="">전체</button>
            <button class="btn btn-outline-dark log-filter-btn" data-event="login">로그인</button>
            <button class="btn btn-outline-dark log-filter-btn" data-event="login_fail">실패</button>
            <button class="btn btn-outline-dark log-filter-btn" data-event="app_enter">앱진입</button>
            <button class="btn btn-outline-dark log-filter-btn" data-event="page_visit">페이지</button>
          </div>
          <button class="btn btn-outline-secondary btn-sm ms-auto" id="refreshLogsBtn">새로고침</button>
        </div>
        <!-- 기간 필터 -->
        <div class="d-flex align-items-center gap-2 mb-2 flex-wrap">
          <input type="date" id="logFrom" class="form-control form-control-sm" style="width:auto;">
          <span class="text-muted">~</span>
          <input type="date" id="logTo" class="form-control form-control-sm" style="width:auto;">
          <button class="btn btn-dark btn-sm" id="applyDate">적용</button>
          <button class="btn btn-outline-secondary btn-sm" id="clearDate">기간 해제</button>
        </div>
        <div class="table-responsive">
          <table class="table table-bordered table-hover table-sm align-middle admin-table">
            <thead class="table-dark">
              <tr><th>일시</th><th>아이디</th><th>이름</th><th>이벤트</th><th>경로</th><th>IP</th></tr>
            </thead>
            <tbody id="logTbody">
              <tr><td colspan="6" class="text-center text-muted">불러오는 중...</td></tr>
            </tbody>
          </table>
        </div>
      </section>

      <!-- ===== 통계 ===== -->
      <section id="sectionStats" class="d-none">
        <div class="d-flex align-items-center mb-3">
          <h6 class="mb-0">최근 30일 통계</h6>
          <button class="btn btn-outline-secondary btn-sm ms-auto" id="refreshStatsBtn">새로고침</button>
        </div>
        <div id="statSummary" class="row g-2 mb-3"></div>
        <div class="table-responsive">
          <table class="table table-bordered table-sm align-middle admin-table">
            <thead class="table-dark">
              <tr><th>날짜</th><th>가입</th><th>로그인</th><th>실패</th><th>앱진입</th><th>페이지</th><th>고유IP</th></tr>
            </thead>
            <tbody id="statTbody">
              <tr><td colspan="7" class="text-center text-muted">불러오는 중...</td></tr>
            </tbody>
          </table>
        </div>
      </section>

      <!-- ===== 설정 ===== -->
      <section id="sectionSettings" class="d-none">
        <div id="setMsg" class="alert d-none"></div>

        <div class="card mb-3" style="max-width:640px;">
          <div class="card-body">
            <h6 class="mb-3">상단 배너</h6>
            <div class="form-check form-switch mb-2">
              <input class="form-check-input" type="checkbox" id="setBannerEnabled">
              <label class="form-check-label" for="setBannerEnabled">배너 표시</label>
            </div>
            <div class="mb-2">
              <label class="form-label small">배너 문구</label>
              <textarea class="form-control" id="setBannerText" rows="2" maxlength="1000" placeholder="예) 6/10 02:00~04:00 점검 예정입니다."></textarea>
            </div>
            <div class="mb-2">
              <label class="form-label small">색상</label>
              <select class="form-select" id="setBannerColor" style="max-width:200px;">
                <option value="info">정보(하늘)</option>
                <option value="warning">주의(노랑)</option>
                <option value="danger">경고(빨강)</option>
                <option value="success">안내(초록)</option>
                <option value="primary">파랑</option>
                <option value="secondary">회색</option>
              </select>
            </div>
            <div class="mb-2">
              <label class="form-label small d-block">표출 페이지</label>
              <div class="d-flex gap-3 flex-wrap">
                <div class="form-check"><input class="form-check-input bpage" type="checkbox" value="login" id="bpLogin"><label class="form-check-label" for="bpLogin">로그인</label></div>
                <div class="form-check"><input class="form-check-input bpage" type="checkbox" value="law" id="bpLaw"><label class="form-check-label" for="bpLaw">법령</label></div>
                <div class="form-check"><input class="form-check-input bpage" type="checkbox" value="interp" id="bpInterp"><label class="form-check-label" for="bpInterp">해석</label></div>
              </div>
            </div>
            <div class="mt-2"><span class="text-muted small">미리보기:</span> <span id="setBannerPreview" class="badge"></span></div>
          </div>
        </div>

        <div class="card mb-3" style="max-width:640px;">
          <div class="card-body">
            <h6 class="mb-3">가입 허용</h6>
            <div class="form-check form-switch">
              <input class="form-check-input" type="checkbox" id="setSignupEnabled">
              <label class="form-check-label" for="setSignupEnabled">신규 회원가입 허용</label>
            </div>
            <div class="text-muted small mt-1">끄면 신규 가입이 차단됩니다(관리자 제외).</div>
          </div>
        </div>

        <button class="btn btn-dark" id="saveSettingsBtn">저장</button>
      </section>
    </div>
  </div>

  <script>
    (function () {
      const $ = (id) => document.getElementById(id);
      const esc = (s) => String(s == null ? '' : s).replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));

      // ── 권한 확인 ──
      async function ensureAdmin() {
        try {
          const me = await (await fetch('/api/auth/me')).json();
          if (!me.authenticated || me.role !== 'admin') {
            $('gateMsg').className = 'alert alert-warning';
            $('gateMsg').innerHTML = '관리자 권한이 필요합니다. <a href="login.html?next=admin.html">로그인</a>';
            return false;
          }
          $('adminContent').classList.remove('d-none');
          return true;
        } catch {
          $('gateMsg').className = 'alert alert-danger';
          $('gateMsg').textContent = '서버 연결에 실패했습니다.';
          return false;
        }
      }

      // ── 회원 관리 ──
      let currentStatus = 'pending';
      const STATUS_BADGE = {
        pending: '<span class="badge bg-warning text-dark">대기</span>',
        approved: '<span class="badge bg-success">승인</span>',
        rejected: '<span class="badge bg-secondary">거부</span>',
        revoked: '<span class="badge bg-danger">정지</span>',
      };

      async function loadMembers() {
        const tbody = $('memberTbody');
        tbody.innerHTML = '<tr><td colspan="9" class="text-center text-muted">불러오는 중...</td></tr>';
        const qs = currentStatus ? `?status=${currentStatus}` : '';
        const data = await (await fetch(`/api/admin/members${qs}`)).json();
        if (!data.success) { tbody.innerHTML = `<tr><td colspan="9" class="text-danger text-center">${esc(data.error)}</td></tr>`; return; }
        if (!data.members.length) { tbody.innerHTML = '<tr><td colspan="9" class="text-center text-muted">없음</td></tr>'; return; }

        tbody.innerHTML = data.members.map((m) => {
          const a = [];
          if (m.role !== 'admin') {
            if (m.status !== 'approved') a.push(`<button class="btn btn-success btn-sm act" data-id="${m.id}" data-act="approve">승인</button>`);
            if (m.status === 'pending') a.push(`<button class="btn btn-outline-secondary btn-sm act" data-id="${m.id}" data-act="reject">거부</button>`);
            if (m.status === 'approved') a.push(`<button class="btn btn-outline-danger btn-sm act" data-id="${m.id}" data-act="revoke">정지</button>`);
          }
          a.push(`<button class="btn btn-outline-primary btn-sm rename-btn" data-id="${m.id}" data-name="${esc(m.display_name)}">이름</button>`);
          if (m.signup_source !== 'app') a.push(`<button class="btn btn-outline-warning btn-sm pw-btn" data-id="${m.id}" data-lid="${esc(m.login_id)}">비번</button>`);
          if (m.role !== 'admin') a.push(`<button class="btn btn-danger btn-sm del-btn" data-id="${m.id}" data-lid="${esc(m.login_id)}">삭제</button>`);
          return `<tr>
            <td>${m.id}</td>
            <td class="small">${esc(m.login_id)}</td>
            <td>${esc(m.display_name) || '-'}</td>
            <td><span class="badge bg-${m.signup_source === 'app' ? 'info' : 'light text-dark'}">${m.signup_source}</span></td>
            <td>${STATUS_BADGE[m.status] || m.status}</td>
            <td>${m.role}</td>
            <td class="small">${(m.created_at || '').slice(0, 10)}</td>
            <td class="small">${(m.last_login_at || '').slice(0, 10) || '-'}</td>
            <td><div class="actions text-nowrap">${a.join(' ') || '-'}</div></td>
          </tr>`;
        }).join('');

        tbody.querySelectorAll('.act').forEach((b) => b.addEventListener('click', async () => {
          b.disabled = true;
          const d = await (await fetch(`/api/admin/members/${b.dataset.id}/${b.dataset.act}`, { method: 'POST' })).json();
          d.success ? loadMembers() : (alert(d.error || '실패'), b.disabled = false);
        }));
        tbody.querySelectorAll('.rename-btn').forEach((b) => b.addEventListener('click', async () => {
          const name = prompt('변경할 이름 (1~50자)', b.dataset.name || '');
          if (name === null) return; const t = name.trim(); if (!t) { alert('이름을 입력해 주세요.'); return; }
          b.disabled = true;
          const d = await (await fetch(`/api/admin/members/${b.dataset.id}/name`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ displayName: t }) })).json();
          d.success ? loadMembers() : (alert(d.error || '실패'), b.disabled = false);
        }));
        tbody.querySelectorAll('.pw-btn').forEach((b) => b.addEventListener('click', async () => {
          const np = prompt(`[${b.dataset.lid}] 새 비밀번호 (영문·숫자 6~30자)`);
          if (np === null) return; if (!/^[a-zA-Z0-9]{6,30}$/.test(np)) { alert('영문·숫자 6~30자'); return; }
          b.disabled = true;
          const d = await (await fetch(`/api/admin/members/${b.dataset.id}/password`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ newPassword: np }) })).json();
          alert(d.success ? '비밀번호가 변경되었습니다.' : (d.error || '실패')); b.disabled = false;
        }));
        tbody.querySelectorAll('.del-btn').forEach((b) => b.addEventListener('click', async () => {
          if (!confirm(`[${b.dataset.lid}] 회원을 완전히 삭제합니다.\n되돌릴 수 없습니다. 계속할까요?`)) return;
          b.disabled = true;
          const d = await (await fetch(`/api/admin/members/${b.dataset.id}`, { method: 'DELETE' })).json();
          d.success ? loadMembers() : (alert(d.error || '실패'), b.disabled = false);
        }));

        refreshPendingBadge(); // 목록 갱신 시 대기 뱃지도 동기화
      }

      document.querySelectorAll('.filter-btn').forEach((b) => b.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach((x) => x.classList.remove('active'));
        b.classList.add('active'); currentStatus = b.dataset.status; loadMembers();
      }));
      $('refreshBtn').addEventListener('click', loadMembers);

      // ── 접근 기록 ──
      const EVENT_LABEL = { login: '로그인', login_fail: '로그인실패', app_enter: '앱진입', page_visit: '페이지접근' };
      const EVENT_COLOR = { login: 'success', login_fail: 'danger', app_enter: 'info', page_visit: 'secondary' };
      let accessLoaded = false, currentLogEvent = '';
      const actorName = (l) => l.display_name ? esc(l.display_name) : (l.login_id ? esc(l.login_id) : '<span class="text-muted">비회원</span>');

      async function loadIpSummary() {
        const tbody = $('ipTbody');
        tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted">불러오는 중...</td></tr>';
        const data = await (await fetch('/api/admin/ip-summary')).json();
        if (!data.success) { tbody.innerHTML = `<tr><td colspan="6" class="text-danger text-center">${esc(data.error)}</td></tr>`; return; }
        if (!data.rows.length) { tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted">없음</td></tr>'; return; }
        tbody.innerHTML = data.rows.map((r) => `<tr>
          <td class="small">${esc(r.login_id)}</td>
          <td class="small">${esc(r.display_name) || '-'}</td>
          <td class="${r.ip_count > 1 ? 'multi-ip' : ''}">${r.ip_count}</td>
          <td class="small ip-list">${esc(r.ips)}</td>
          <td class="small">${r.total}</td>
          <td class="small text-nowrap">${(r.last_at || '').replace('T', ' ').slice(0, 16)}</td>
        </tr>`).join('');
      }

      async function loadLogs() {
        const tbody = $('logTbody');
        tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted">불러오는 중...</td></tr>';
        const p = new URLSearchParams();
        if (currentLogEvent) p.set('event', currentLogEvent);
        if (logFrom) p.set('from', logFrom);
        if (logTo) p.set('to', logTo);
        const qs = p.toString() ? `?${p.toString()}` : '';
        const data = await (await fetch(`/api/admin/logs${qs}`)).json();
        if (!data.success) { tbody.innerHTML = `<tr><td colspan="6" class="text-danger text-center">${esc(data.error)}</td></tr>`; return; }
        if (!data.logs.length) { tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted">없음</td></tr>'; return; }
        tbody.innerHTML = data.logs.map((l) => `<tr>
          <td class="small text-nowrap">${(l.created_at || '').replace('T', ' ').slice(0, 19)}</td>
          <td class="small">${l.login_id ? esc(l.login_id) : '-'}</td>
          <td class="small">${actorName(l)}</td>
          <td><span class="badge bg-${EVENT_COLOR[l.event] || 'secondary'}">${EVENT_LABEL[l.event] || l.event}</span></td>
          <td class="small">${esc(l.path) || '-'}</td>
          <td class="small">${esc(l.ip) || '-'}</td>
        </tr>`).join('');
      }

      function loadAccess() { loadFailWarnings(); loadIpSummary(); loadLogs(); }

      document.querySelectorAll('.log-filter-btn').forEach((b) => b.addEventListener('click', () => {
        document.querySelectorAll('.log-filter-btn').forEach((x) => x.classList.remove('active'));
        b.classList.add('active'); currentLogEvent = b.dataset.event; loadLogs();
      }));
      $('refreshLogsBtn').addEventListener('click', loadAccess);

      // ── 기간 필터 ──
      let logFrom = '', logTo = '';
      $('applyDate').addEventListener('click', () => { logFrom = $('logFrom').value; logTo = $('logTo').value; loadLogs(); });
      $('clearDate').addEventListener('click', () => { logFrom = ''; logTo = ''; $('logFrom').value = ''; $('logTo').value = ''; loadLogs(); });

      // ── 로그인 실패 경고 ──
      async function loadFailWarnings() {
        const data = await (await fetch('/api/admin/fail-warnings')).json();
        const box = $('failWarnBox');
        if (!data.success || !data.rows.length) { box.classList.add('d-none'); return; }
        box.classList.remove('d-none');
        $('failWarnList').innerHTML = data.rows.map((r) =>
          `<div>아이디 <strong>${esc(r.login_id) || '-'}</strong> · IP ${esc(r.ip)} · 실패 <strong>${r.fails}회</strong> (최근 ${(r.last_at || '').replace('T', ' ').slice(5, 16)})</div>`
        ).join('');
      }

      // ── 통계 ──
      let statsLoaded = false;
      async function loadStats() {
        const data = await (await fetch('/api/admin/stats?days=30')).json();
        if (!data.success) return;
        // 가입 추이를 날짜별 맵으로
        const signupMap = {};
        data.signups.forEach((s) => { signupMap[(s.d || '').slice(0, 10)] = s.cnt; });
        // 합계 카드
        const sum = data.events.reduce((a, e) => {
          a.login += +e.login; a.fail += +e.login_fail; a.app += +e.app_enter; a.visit += +e.page_visit; return a;
        }, { login: 0, fail: 0, app: 0, visit: 0 });
        const signupTotal = data.signups.reduce((a, s) => a + +s.cnt, 0);
        const card = (label, val, color) => `<div class="col-6 col-md-2"><div class="card text-center"><div class="card-body p-2"><div class="small text-muted">${label}</div><div class="h5 mb-0 text-${color}">${val}</div></div></div></div>`;
        $('statSummary').innerHTML =
          card('가입', signupTotal, 'primary') + card('로그인', sum.login, 'success') +
          card('실패', sum.fail, 'danger') + card('앱진입', sum.app, 'info') +
          card('페이지', sum.visit, 'secondary');
        // 일별 표
        const tbody = $('statTbody');
        if (!data.events.length) { tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted">데이터 없음</td></tr>'; return; }
        tbody.innerHTML = data.events.map((e) => {
          const d = (e.d || '').slice(0, 10);
          return `<tr><td class="small">${d}</td><td>${signupMap[d] || 0}</td><td>${e.login}</td>
            <td class="${+e.login_fail > 0 ? 'text-danger' : ''}">${e.login_fail}</td>
            <td>${e.app_enter}</td><td>${e.page_visit}</td><td>${e.uniq_ip}</td></tr>`;
        }).join('');
      }
      $('refreshStatsBtn').addEventListener('click', loadStats);

      // ── 대기 뱃지 ──
      async function refreshPendingBadge() {
        try {
          const data = await (await fetch('/api/admin/pending-count')).json();
          const b = $('pendBadge');
          if (data.success && data.count > 0) { b.textContent = data.count; b.classList.remove('d-none'); }
          else b.classList.add('d-none');
        } catch {}
      }

      // ── 설정 ──
      let settingsLoaded = false;
      function bannerPreview() {
        const colors = { info: '#0dcaf0', warning: '#ffc107', danger: '#dc3545', success: '#198754', primary: '#0d6efd', secondary: '#6c757d' };
        const c = $('setBannerColor').value;
        const p = $('setBannerPreview');
        p.style.background = colors[c] || colors.info;
        p.style.color = (c === 'warning' || c === 'info') ? '#212529' : '#fff';
        p.textContent = $('setBannerText').value || '(문구 없음)';
      }
      async function loadSettings() {
        const data = await (await fetch('/api/admin/settings')).json();
        if (!data.success) return;
        const s = data.settings;
        $('setBannerEnabled').checked = s.banner_enabled;
        $('setBannerText').value = s.banner_text || '';
        $('setBannerColor').value = s.banner_color || 'info';
        const pages = s.banner_pages || ['login', 'law', 'interp'];
        $('bpLogin').checked = pages.includes('login');
        $('bpLaw').checked = pages.includes('law');
        $('bpInterp').checked = pages.includes('interp');
        $('setSignupEnabled').checked = s.signup_enabled;
        bannerPreview();
      }
      ['setBannerText', 'setBannerColor'].forEach((id) => $(id).addEventListener('input', bannerPreview));
      $('saveSettingsBtn').addEventListener('click', async () => {
        const body = {
          banner_enabled: $('setBannerEnabled').checked,
          banner_text: $('setBannerText').value,
          banner_color: $('setBannerColor').value,
          banner_pages: Array.from(document.querySelectorAll('.bpage:checked')).map((c) => c.value),
          signup_enabled: $('setSignupEnabled').checked,
        };
        const data = await (await fetch('/api/admin/settings', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) })).json();
        const m = $('setMsg');
        m.className = 'alert alert-' + (data.success ? 'success' : 'danger');
        m.textContent = data.success ? '저장되었습니다.' : (data.error || '저장 실패');
        setTimeout(() => m.classList.add('d-none'), 2500);
      });

      // ── 탭 전환 ──
      function switchTab(active) {
        ['Members', 'Access', 'Stats', 'Settings'].forEach((t) => {
          $('nav' + t).classList.toggle('active', t === active);
          $('section' + t).classList.toggle('d-none', t !== active);
        });
      }
      $('navMembers').addEventListener('click', () => switchTab('Members'));
      $('navAccess').addEventListener('click', () => {
        switchTab('Access');
        if (!accessLoaded) { accessLoaded = true; loadAccess(); }
      });
      $('navStats').addEventListener('click', () => {
        switchTab('Stats');
        if (!statsLoaded) { statsLoaded = true; loadStats(); }
      });
      $('navSettings').addEventListener('click', () => {
        switchTab('Settings');
        if (!settingsLoaded) { settingsLoaded = true; loadSettings(); }
      });

      $('logoutBtn').addEventListener('click', async () => {
        await fetch('/api/auth/logout', { method: 'POST' });
        location.href = 'login.html';
      });

      (async () => { if (await ensureAdmin()) { loadMembers(); refreshPendingBadge(); } })();
    })();
  </script>
</body>

</html>
